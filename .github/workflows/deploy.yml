name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
  AWS_S3_BUCKET: ${{ vars.AWS_S3_BUCKET }}
  AWS_CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out validated commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20.3.0
          cache: npm

      - name: Validate deployment inputs
        run: |
          test -n "$AWS_REGION" || { echo "Missing required GitHub variable: AWS_REGION"; exit 1; }
          test -n "$AWS_ROLE_TO_ASSUME" || { echo "Missing required GitHub variable: AWS_ROLE_TO_ASSUME"; exit 1; }
          test -n "$AWS_S3_BUCKET" || { echo "Missing required GitHub variable: AWS_S3_BUCKET"; exit 1; }
          test -n "$AWS_CLOUDFRONT_DISTRIBUTION_ID" || { echo "Missing required GitHub variable: AWS_CLOUDFRONT_DISTRIBUTION_ID"; exit 1; }

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@fb7eb401298e393da51cdcb2feb1ed0183619014
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync site to S3
        run: aws s3 sync dist/ s3://$AWS_S3_BUCKET --delete

      - name: Invalidate CloudFront HTML entry points
        run: aws cloudfront create-invalidation --distribution-id "$AWS_CLOUDFRONT_DISTRIBUTION_ID" --paths "/*"
